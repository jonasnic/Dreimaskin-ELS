[env:esp32doit-devkit-v1]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino

build_src_filter =
	+<*>
	-<motion/motion_task copy.cpp>
	-<motion/motion_task from other project.cpp>

monitor_speed = 500000
upload_speed = 921600

lib_deps =
	knolleary/PubSubClient@^2.8

build_flags =
	-DWIFI_SSID=\"Mew\"
	-DWIFI_PASSWORD=\"Fossnesveien14\"
	-DMQTT_BROKER=\"192.168.1.92\"
	-DMQTT_PORT=1883
	-DMQTT_CLIENT_ID=\"dreimaskin_els\"